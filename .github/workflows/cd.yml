name: VoltaSplat CD

on:
  release:
    types: [published]
  workflow_dispatch: # Allows you to manually trigger the deployment from the GitHub Actions UI

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install uv and build dependencies
      run: |
        pip install uv
        uv pip install --system build twine
        
    - name: Build Source Distribution and Wheel
      run: |
        python -m build
        
    - name: Publish to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        # In a real environment, uncomment the following line to deploy
        # twine upload dist/*
        echo "Dry run: Package is built and ready for PyPI distribution."
