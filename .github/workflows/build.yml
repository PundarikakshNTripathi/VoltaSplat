name: VoltaSplat CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install uv
      run: pip install uv
      
    - name: Install PyTorch and dependencies
      run: |
        uv pip install --system torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
        uv pip install --system pytest
        
    # Note: We cannot easily test CUDA extensions on GitHub Actions standard runners.
    # A self-hosted runner with a GPU is required to compile and test NVCC code natively.
    - name: Mock Compilation Test
      run: |
        echo "CUDA extensions require an NVIDIA GPU runner to compile and test."
        echo "Use self-hosted runners to execute: uv pip install --system -e . --no-build-isolation"
